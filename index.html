<!DOCTYPE html>

<head> <title> Praticando HTML </title>
    <style>
    body {
         background-color: black;
         color: White;
          display: flex;
          flex-direction: column;
          align-items: center; 
          justify-content:center;
          min-height: 100vh;
          margin:0;
    }

    img {
        width:150px;
        height:150px;
        object-fit: cover;
        border-radius: 50%;
        border:3px solid whitesmoke;
    }
a {
    text-decoration: none;
    color: white;
    background-color: #222;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #444;
    display: block;
    text-align: center;
    transition: 0.3s; /* Isso faz um efeito suave ao passar o mouse */
}

/* Bônus: O efeito de passar o mouse */
a:hover {
    background-color: rgb(45, 178, 245);
    color: black;
}
div {
    width: 300px;
    text-align: center;
}

    </style>
